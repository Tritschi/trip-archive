create_trip:
  name: Reise aus Recorder archivieren
  description: Archiviert GPS- und Kilometerdaten ausschließlich aus dem Home-Assistant-Recorder.
  fields:
    name:
      name: Name
      required: true
      selector:
        text:
    start:
      name: Start
      required: true
      selector:
        datetime:
    end:
      name: Ende
      required: true
      selector:
        datetime:
    tracker_entity:
      name: Device Tracker
      required: true
      selector:
        entity:
          domain: device_tracker
    odometer_entity:
      name: Streckenzähler (optional)
      required: true
      selector:
        entity:
          domain: sensor
    tolerance_m:
      name: Kartendarstellung vereinfachen
      default: 35
      selector:
        number:
          min: 0
          max: 2000
          mode: box
    gap_minutes:
      name: Etappen automatisch erkennen
      default: 360
      selector:
        number:
          min: 0
          max: 10080
          mode: box
